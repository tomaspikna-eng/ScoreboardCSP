<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConnectScore Pro – Nastavenia profilu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg2:#0d0d11;--bg3:#131318;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.04);
  --text:#eeeef2;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-dim:rgba(212,168,67,.09);--gold-b:rgba(212,168,67,.22);
  --green:#1ec86a;--green-dim:rgba(30,200,106,.08);--green-b:rgba(30,200,106,.2);
  --red:#d94f4f;--red-dim:rgba(217,79,79,.08);--red-b:rgba(217,79,79,.22);
  --font:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(212,168,67,.06),transparent 55%),var(--bg);
  padding:32px 16px 80px;}
.shell{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.topbar{display:flex;align-items:center;justify-content:space-between}
.brand{font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
.brand span{color:var(--gold)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;color:var(--muted2);text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.02);transition:.15s}
.back:hover{color:var(--text)}
h1{font-size:1.8rem;font-weight:900;letter-spacing:-.04em;color:var(--gold)}
.sub{color:var(--muted2);font-size:.88rem;margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:22px}
.card-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);font-weight:700;margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2)}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.88rem;padding:10px 12px;outline:none;transition:.15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-b)}
.field textarea{min-height:80px;resize:vertical}
.field select{cursor:pointer}
.role-section{display:none}
.role-section.visible{display:flex;flex-direction:column;gap:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 18px;min-height:42px;border-radius:11px;font:700 .88rem/1 var(--font);cursor:pointer;border:none;text-decoration:none;transition:.15s}
.btn-gold{background:var(--gold);color:#1a1000}.btn-gold:hover{background:#e8b94f}
.btn-dark{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}.btn-dark:hover{background:rgba(255,255,255,.09)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;display:none;text-align:center;margin-top:4px}
.msg.ok{background:var(--green-dim);border:1px solid var(--green-b);color:#c8ffdc;display:block}
.msg.err{background:var(--red-dim);border:1px solid var(--red-b);color:#ffd0d0;display:block}
.avatar-row{display:flex;align-items:center;gap:16px;padding:14px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.015)}
.avatar-ring{width:70px;height:70px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--gold),rgba(74,130,204,.5));cursor:pointer;flex:0 0 70px}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;background:var(--bg3);display:block}

/* PLÁN — Free badge for now */
.plan-info{padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:space-between;gap:12px}
.plan-info .label{font-size:.7rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.plan-info .val{font-size:.95rem;font-weight:800;color:var(--gold)}

/* MULTI-SPORT ŠPORTOVISKÁ */
.sport-block{border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02);overflow:hidden}
.sport-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:.15s}
.sport-head:hover{background:rgba(255,255,255,.03)}
.sport-block.sel .sport-head{background:var(--gold-dim);border-bottom:1px solid var(--gold-b)}
.sport-cbx{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex:0 0 18px;transition:.15s}
.sport-block.sel .sport-cbx{background:var(--gold);color:#1a1000;border-color:var(--gold)}
.sport-icon{font-size:1.2rem}
.sport-name{font-size:.88rem;font-weight:800;flex:1}
.sport-body{display:none;padding:12px 14px;border-top:1px solid var(--line)}
.sport-block.sel .sport-body{display:block}
.sport-body-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.venue-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.venue-row input{flex:1;padding:8px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.82rem;outline:none}
.venue-row .num{width:60px;flex:0 0 60px;text-align:center}
.venue-row input:focus{border-color:var(--gold-b)}
.del-btn{width:30px;height:30px;border-radius:7px;border:1px solid rgba(217,79,79,.3);background:rgba(217,79,79,.07);color:var(--red);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex:0 0 30px;transition:.15s}
.del-btn:hover{background:rgba(217,79,79,.15)}
.add-venue{width:100%;padding:7px;margin-top:4px;border-radius:8px;border:1px dashed rgba(255,255,255,.15);background:transparent;color:var(--muted);font-size:.75rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:.15s}
.add-venue:hover{color:var(--text);border-color:rgba(255,255,255,.3)}

@media(max-width:600px){.row2{grid-template-columns:1fr}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="brand"><span>ConnectScore</span>Pro</div>
    <a href="#" id="backLink" class="back">← Späť na profil</a>
  </div>

  <div>
    <h1>Nastavenia profilu</h1>
    <p class="sub">Uprav svoje údaje a športoviská.</p>
  </div>

  <!-- AKTUÁLNY PLÁN -->
  <div class="card">
    <div class="card-title">Tvoj plán</div>
    <div class="plan-info">
      <div>
        <div class="label">Aktuálny plán</div>
        <div class="val" id="currentPlan">Free</div>
      </div>
      <button class="btn btn-gold" onclick="alert('Plány budú dostupné čoskoro. Zatiaľ je všetko zdarma 🎉')" style="font-size:.78rem;min-height:34px;padding:0 14px">Zmeniť plán</button>
    </div>
  </div>

  <!-- AVATAR -->
  <div class="card">
    <div class="card-title">Profilový obrázok</div>
    <div class="avatar-row">
      <div class="avatar-ring" onclick="document.getElementById('avatarFile').click()">
        <img id="avatarImg" src="" alt=""/>
      </div>
      <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/>
      <div>
        <div style="font-size:.85rem;font-weight:700" id="avatarStatus">Nahrať foto</div>
        <div style="font-size:.73rem;color:var(--muted2);margin-top:3px">JPG, PNG, WebP · max 5 MB</div>
      </div>
    </div>
  </div>

  <!-- HRÁČ FIELDS -->
  <div class="card role-section" id="fieldsHrac">
    <div class="card-title">Hráčske údaje</div>
    <div class="row2">
      <div class="field"><label>Meno a priezvisko</label><input id="hMeno"/></div>
      <div class="field"><label>Prezývka</label><input id="hNick"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Mesto</label><input id="hMesto"/></div>
      <div class="field">
        <label>Hlavný šport</label>
        <select id="hSport">
          <option value="">— vyber —</option>
          <option value="billiard">🎱 Biliard</option>
          <option value="darts">🎯 Šípky</option>
          <option value="bowling">🎳 Bowling</option>
          <option value="cards">🃏 Karty</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Klub kde hrám (voliteľné)</label><input id="hKlub"/></div>
    <div class="field"><label>O mne</label><textarea id="hBio"></textarea></div>
  </div>

  <!-- KLUB FIELDS -->
  <div class="card role-section" id="fieldsKlub">
    <div class="card-title">Údaje klubu</div>
    <div class="field"><label>Názov klubu</label><input id="kNazov"/></div>
    <div class="row2">
      <div class="field"><label>Mesto</label><input id="kMesto"/></div>
      <div class="field"><label>Adresa</label><input id="kAdresa"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Kontaktný email</label><input id="kEmail" type="email"/></div>
      <div class="field"><label>Telefón</label><input id="kPhone"/></div>
    </div>
    <div class="field"><label>Otváracie hodiny</label><input id="kHodiny" placeholder="15:00 – 23:00"/></div>
    <div class="field"><label>O klube</label><textarea id="kBio"></textarea></div>

    <div>
      <label style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2);display:block;margin-bottom:8px">Ponúkané športy a športoviská</label>
      <div id="sportBlocks" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>

  <!-- ORG FIELDS -->
  <div class="card role-section" id="fieldsOrg">
    <div class="card-title">Údaje organizácie</div>
    <div class="field"><label>Názov organizácie</label><input id="oNazov"/></div>
    <div class="row2">
      <div class="field"><label>Štát / Región</label><input id="oStat"/></div>
      <div class="field"><label>Kontaktný email</label><input id="oEmail" type="email"/></div>
    </div>
    <div class="field">
      <label>Hlavný šport</label>
      <select id="oSport">
        <option value="">— vyber —</option>
        <option value="billiard">🎱 Biliard</option>
        <option value="darts">🎯 Šípky</option>
        <option value="bowling">🎳 Bowling</option>
        <option value="multi">🏅 Multi-šport</option>
      </select>
    </div>
    <div class="field"><label>O organizácii</label><textarea id="oBio"></textarea></div>
  </div>

  <div>
    <div class="msg" id="saveMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <a href="#" id="cancelLink" class="btn btn-dark">Zrušiť</a>
      <button class="btn btn-gold" id="btnSave">💾 Uložiť</button>
    </div>
  </div>

</div>

<script>
const SB = window.supabase.createClient(
  'https://gilzomwhuwcxpkegtlhj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbHpvbXdodXdjeHBrZWd0bGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzMwMTgsImV4cCI6MjA5MjYwOTAxOH0.-KiLSdiB2mRWqUDB9GWyISfCu2o_ZBM80aGUEW9CcUg'
);

let currentUser = null;
let currentRole = null;

const SPORTS_DEF = [
  {key:'billiard', icon:'🎱', name:'Biliard', placeholder:'napr. 9ft Rasson stôl'},
  {key:'darts',    icon:'🎯', name:'Šípky',   placeholder:'napr. Steel terče Winmau'},
  {key:'bowling',  icon:'🎳', name:'Bowling', placeholder:'napr. Profi dráhy'},
  {key:'cards',    icon:'🃏', name:'Karty',   placeholder:'napr. Pokrový stôl 8 miest'},
];

const sportsState = {};
SPORTS_DEF.forEach(s => sportsState[s.key] = {selected:false, venues:[]});

function renderSportBlocks(){
  const cont = document.getElementById('sportBlocks');
  if(!cont) return;
  cont.innerHTML = SPORTS_DEF.map(s => {
    const st = sportsState[s.key];
    const venuesHTML = (st.venues||[]).map((v,i) => `
      <div class="venue-row">
        <input class="num" type="number" min="1" max="99" value="${v.count}"
          oninput="sportsState['${s.key}'].venues[${i}].count = parseInt(this.value)||1"/>
        <input value="${(v.label||'').replace(/"/g,'&quot;')}" placeholder="${s.placeholder}"
          oninput="sportsState['${s.key}'].venues[${i}].label = this.value"/>
        <button class="del-btn" onclick="removeVenue('${s.key}',${i})">✕</button>
      </div>`).join('');
    return `
      <div class="sport-block ${st.selected?'sel':''}">
        <div class="sport-head" onclick="toggleSport('${s.key}')">
          <div class="sport-cbx">${st.selected?'✓':''}</div>
          <div class="sport-icon">${s.icon}</div>
          <div class="sport-name">${s.name}</div>
        </div>
        <div class="sport-body">
          <div class="sport-body-label">Športoviská (počet · popis)</div>
          ${venuesHTML}
          <button class="add-venue" onclick="addVenue('${s.key}')">+ Pridať športovisko</button>
        </div>
      </div>`;
  }).join('');
}

function toggleSport(key){
  sportsState[key].selected = !sportsState[key].selected;
  if(sportsState[key].selected && sportsState[key].venues.length === 0){
    sportsState[key].venues.push({count:1, label:''});
  }
  renderSportBlocks();
}

function addVenue(key){
  sportsState[key].venues.push({count:1, label:''});
  renderSportBlocks();
}

function removeVenue(key, idx){
  sportsState[key].venues.splice(idx,1);
  if(sportsState[key].venues.length === 0) sportsState[key].selected = false;
  renderSportBlocks();
}

// ── AUTH + LOAD ──
SB.auth.onAuthStateChange(async (event, session) => {
  if(!session){ window.location.href = '/login/'; return; }
  if(event === 'SIGNED_IN' || event === 'INITIAL_SESSION'){
    currentUser = session.user;
    await loadProfile();
  }
});

async function loadProfile(){
  const {data:p, error} = await SB.from('profiles').select('*').eq('id',currentUser.id).single();
  if(error){ console.error('Load error:', error); }

  currentRole = p?.role || null;

  // Naplň polia
  const set = (id, v) => { const el = document.getElementById(id); if(el && v != null) el.value = v; };

  if(currentRole === 'hrac'){
    document.getElementById('fieldsHrac').classList.add('visible');
    set('hMeno', p.full_name);
    set('hNick', p.username);
    set('hMesto', p.city);
    set('hSport', p.sport);
    set('hKlub', p.club_name);
    set('hBio', p.bio);
  }
  if(currentRole === 'klub'){
    document.getElementById('fieldsKlub').classList.add('visible');
    set('kNazov', p.full_name || p.club_name);
    set('kMesto', p.city);
    set('kAdresa', p.address);
    set('kEmail', p.contact_email);
    set('kPhone', p.phone);
    set('kHodiny', p.open_hours);
    set('kBio', p.bio);

    // Načítaj športoviská — môže byť starý formát (array) alebo nový (per sport)
    if(p.sport){
      const sports = p.sport.split(',').map(s => s.trim()).filter(Boolean);
      sports.forEach(key => { if(sportsState[key]) sportsState[key].selected = true; });
    }
    if(p.sportoviska){
      try{
        const parsed = JSON.parse(p.sportoviska);
        // Ak je to objekt {billiard:[...], darts:[...]} — nový formát
        if(parsed && typeof parsed === 'object' && !Array.isArray(parsed)){
          Object.keys(parsed).forEach(key => {
            if(sportsState[key]){
              sportsState[key].selected = true;
              sportsState[key].venues = (parsed[key]||[]).map(v => ({count:v.count||1, label:v.label||''}));
            }
          });
        }
        // Ak je to array — starý formát, nedá sa priradiť k športu, ignorujeme
      }catch(e){ console.warn('Parse sportoviska error:', e); }
    }
    // Ak je vybraný šport ale nemá venues, pridaj prázdnu položku
    Object.keys(sportsState).forEach(key => {
      if(sportsState[key].selected && sportsState[key].venues.length === 0){
        sportsState[key].venues.push({count:1, label:''});
      }
    });
    renderSportBlocks();
  }
  if(currentRole === 'organizacia'){
    document.getElementById('fieldsOrg').classList.add('visible');
    set('oNazov', p.full_name);
    set('oStat', p.city);
    set('oEmail', p.contact_email);
    set('oSport', p.sport);
    set('oBio', p.bio);
  }
  if(!currentRole){
    // Nemá rolu → presmeruj na registráciu
    alert('Najprv si dokonči registráciu.');
    window.location.href = '/registracia/';
    return;
  }

  // Plán
  document.getElementById('currentPlan').textContent = (p.plan || 'Free').charAt(0).toUpperCase() + (p.plan || 'free').slice(1);

  // Linky späť
  const profileMap = {hrac:'/hrac/', klub:'/klub/', organizacia:'/organizacia/'};
  const backUrl = profileMap[currentRole] || '/klub/';
  document.getElementById('backLink').href = backUrl;
  document.getElementById('cancelLink').href = backUrl;

  // Avatar
  const img = document.getElementById('avatarImg');
  if(p.avatar_url) img.src = p.avatar_url + '?t=' + Date.now();
  else if(currentUser.user_metadata?.avatar_url) img.src = currentUser.user_metadata.avatar_url;
}

// ── SAVE ──
document.getElementById('btnSave').addEventListener('click', async () => {
  if(!currentUser){
    showMsg('Nie si prihlásený.','err');
    return;
  }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '⏳ Ukladám...';

  let payload = { id: currentUser.id, role: currentRole };

  if(currentRole === 'hrac'){
    const meno = document.getElementById('hMeno').value.trim();
    if(!meno){ showMsg('Vyplň meno.','err'); btn.disabled=false; btn.textContent='💾 Uložiť'; return; }
    payload.full_name = meno;
    payload.username  = document.getElementById('hNick').value.trim().toLowerCase().replace(/[^a-z0-9_.]/g,'') || null;
    payload.city      = document.getElementById('hMesto').value.trim() || null;
    payload.sport     = document.getElementById('hSport').value || null;
    payload.club_name = document.getElementById('hKlub').value.trim() || null;
    payload.bio       = document.getElementById('hBio').value.trim() || null;
  }

  if(currentRole === 'klub'){
    const nazov = document.getElementById('kNazov').value.trim();
    if(!nazov){ showMsg('Vyplň názov klubu.','err'); btn.disabled=false; btn.textContent='💾 Uložiť'; return; }

    const selectedSports = [];
    const venuesData = {};
    Object.keys(sportsState).forEach(key => {
      if(sportsState[key].selected){
        selectedSports.push(key);
        venuesData[key] = sportsState[key].venues.filter(v => v.label && v.label.trim()).map(v => ({
          count: parseInt(v.count)||1,
          label: v.label.trim()
        }));
      }
    });

    payload.full_name     = nazov;
    payload.club_name     = nazov;
    payload.city          = document.getElementById('kMesto').value.trim() || null;
    payload.address       = document.getElementById('kAdresa').value.trim() || null;
    payload.contact_email = document.getElementById('kEmail').value.trim() || null;
    payload.phone         = document.getElementById('kPhone').value.trim() || null;
    payload.open_hours    = document.getElementById('kHodiny').value.trim() || null;
    payload.bio           = document.getElementById('kBio').value.trim() || null;
    payload.sport         = selectedSports.join(',') || null;
    payload.sportoviska   = selectedSports.length ? JSON.stringify(venuesData) : null;
  }

  if(currentRole === 'organizacia'){
    const nazov = document.getElementById('oNazov').value.trim();
    if(!nazov){ showMsg('Vyplň názov organizácie.','err'); btn.disabled=false; btn.textContent='💾 Uložiť'; return; }
    payload.full_name     = nazov;
    payload.city          = document.getElementById('oStat').value.trim() || null;
    payload.contact_email = document.getElementById('oEmail').value.trim() || null;
    payload.sport         = document.getElementById('oSport').value || null;
    payload.bio           = document.getElementById('oBio').value.trim() || null;
  }

  console.log('Saving:', payload);

  const {data, error} = await SB.from('profiles').upsert(payload).select();

  btn.disabled = false;
  btn.textContent = '💾 Uložiť';

  if(error){
    console.error('Save error:', error);
    let msg = 'Chyba: ' + error.message;
    if(error.message.includes('column')) msg += ' — pravdepodobne chýba stĺpec v Supabase tabuľke profiles.';
    if(error.message.includes('unique')) msg = 'Toto meno je už obsadené.';
    showMsg(msg,'err');
    return;
  }

  console.log('Saved:', data);
  showMsg('✓ Uložené!','ok');

  const profileMap = {hrac:'/hrac/', klub:'/klub/', organizacia:'/organizacia/'};
  setTimeout(() => window.location.href = profileMap[currentRole] || '/klub/', 1200);
});

function showMsg(text, type){
  const el = document.getElementById('saveMsg');
  el.innerHTML = text;
  el.className = 'msg ' + type;
}

// ── AVATAR ──
async function uploadAvatar(input){
  const file = input.files[0];
  if(!file || !currentUser) return;
  if(file.size > 5*1024*1024){ alert('Max 5 MB.'); return; }
  document.getElementById('avatarStatus').textContent = '⏳ Nahrávam...';
  const ext = file.name.split('.').pop() || 'jpg';
  const path = 'avatars/' + currentUser.id + '/avatar.' + ext;
  const {error} = await SB.storage.from('avatars').upload(path, file, {upsert:true, contentType:file.type});
  if(error){ alert('Chyba: '+error.message); document.getElementById('avatarStatus').textContent='Nahrať foto'; return; }
  const {data:u} = SB.storage.from('avatars').getPublicUrl(path);
  await SB.from('profiles').update({avatar_url:u.publicUrl}).eq('id', currentUser.id);
  document.getElementById('avatarImg').src = u.publicUrl + '?t=' + Date.now();
  document.getElementById('avatarStatus').textContent = '✓ Aktualizované';
  input.value = '';
}
</script>
</body>
</html>
