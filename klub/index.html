<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConnectScore Pro – Klub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg2:#0d0d11;--bg3:#131318;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.04);
  --text:#eeeef2;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-dim:rgba(212,168,67,.09);--gold-b:rgba(212,168,67,.22);
  --green:#1ec86a;--green-dim:rgba(30,200,106,.08);--green-b:rgba(30,200,106,.2);
  --red:#d94f4f;
  --font:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(212,168,67,.07),transparent 55%),var(--bg);}
.page{max-width:1100px;margin:0 auto;padding:28px 20px 80px}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.brand{font-size:1.1rem;font-weight:800;letter-spacing:-.03em}
.brand span{color:var(--gold)}
.topbar-right{display:flex;gap:8px;align-items:center}

.hero{padding:24px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;margin-bottom:16px}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.04em;line-height:1;margin-bottom:8px}
.hero-name span{color:var(--gold)}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted2)}
.tag.gold{border-color:var(--gold-b);background:var(--gold-dim);color:var(--gold)}
.tag.green{border-color:var(--green-b);background:var(--green-dim);color:var(--green)}

.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);font-weight:700;margin-bottom:14px}

.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tool{border:1px solid var(--line);border-radius:12px;padding:14px;background:rgba(255,255,255,.02);text-decoration:none;display:block;transition:.15s}
.tool:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12)}
.tool-icon{font-size:1.4rem;margin-bottom:6px}
.tool-name{font-size:.88rem;font-weight:700;color:var(--text)}
.tool-desc{font-size:.7rem;color:var(--muted2);margin-top:2px;line-height:1.4}

.info-list{display:flex;flex-direction:column;gap:0}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2);gap:12px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:.72rem;color:var(--muted2)}
.info-val{font-size:.78rem;font-weight:700;color:var(--text);text-align:right}

.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;min-height:36px;border-radius:10px;font:700 .82rem/1 var(--font);cursor:pointer;border:none;text-decoration:none;transition:.15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:#1a1000}.btn-gold:hover{background:#e8b94f}
.btn-dark{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}.btn-dark:hover{background:rgba(255,255,255,.09)}
.btn-sm{min-height:28px;padding:0 10px;font-size:.72rem;border-radius:7px}

.loading{padding:40px;text-align:center;color:var(--muted2)}
.error-box{padding:16px;background:rgba(217,79,79,.08);border:1px solid rgba(217,79,79,.22);border-radius:12px;color:#ffd0d0;margin-bottom:16px}

@media(max-width:600px){.tools{grid-template-columns:1fr}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="brand"><span>ConnectScore</span>Pro</div>
    <div class="topbar-right">
      <a href="/nastavenie-profilu/" class="btn btn-dark btn-sm">⚙️ Nastavenia</a>
      <button class="btn btn-dark btn-sm" onclick="doLogout()">Odhlásiť</button>
    </div>
  </div>

  <div id="content">
    <div class="loading">Načítavam profil...</div>
  </div>

</div>

<script>
(function(){
  if(window.location.hash && window.location.hash.includes('access_token'))
    history.replaceState(null,'',window.location.pathname);
})();

const SB = window.supabase.createClient(
  'https://gilzomwhuwcxpkegtlhj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbHpvbXdodXdjeHBrZWd0bGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzMwMTgsImV4cCI6MjA5MjYwOTAxOH0.-KiLSdiB2mRWqUDB9GWyISfCu2o_ZBM80aGUEW9CcUg'
);

async function init(){
  console.log('[KLUB] init');

  const { data: { session } } = await SB.auth.getSession();

  if(!session){
    console.log('[KLUB] No session → /login/');
    showError('Nie si prihlásený.', '<a href="/login/" class="btn btn-gold">Prihlásiť sa →</a>');
    return;
  }

  console.log('[KLUB] Session OK:', session.user.email);

  const { data: p, error } = await SB.from('profiles').select('*').eq('id', session.user.id).maybeSingle();

  if(error){
    console.error('[KLUB] Profile fetch error:', error);
    showError('Chyba pri načítaní profilu: ' + error.message, '');
    return;
  }

  if(!p){
    console.log('[KLUB] No profile → /registracia/');
    showError('Profil neexistuje. Dokonči registráciu.', '<a href="/registracia/" class="btn btn-gold">Pokračovať →</a>');
    return;
  }

  console.log('[KLUB] Profile loaded:', p);
  renderProfile(p, session.user);
}

function showError(msg, btnHTML){
  document.getElementById('content').innerHTML = `
    <div class="error-box">${msg}</div>
    ${btnHTML}`;
}

function renderProfile(p, user){
  const name = p.full_name || p.club_name || p.username || user.email.split('@')[0];
  const parts = name.split(' ');
  const nameHTML = parts.length > 1
    ? parts[0] + ' <span>' + parts.slice(1).join(' ') + '</span>'
    : name;

  const planMap = {free:'Free', pro:'Pro', ultra:'Ultra'};
  const planLabel = planMap[p.plan] || 'Free';

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-name">${nameHTML}</div>
      <div class="hero-meta">
        <span class="tag gold">🏛️ Klub</span>
        <span class="tag gold">⭐ ${planLabel}</span>
        ${p.city ? '<span class="tag">📍 '+p.city+'</span>' : ''}
        ${p.open_hours ? '<span class="tag">🕐 '+p.open_hours+'</span>' : ''}
        <span class="tag green">● Aktívne</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
        <a href="/rezervacia/moment-club/" class="btn btn-gold">📆 Rezervácie</a>
        <a href="/nastavenie-turnaja/" class="btn btn-dark">🏆 Vytvoriť turnaj</a>
        <a href="/vytvorit-udalost/" class="btn btn-dark">📅 Udalosť</a>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Nástroje klubu</div>
      <div class="tools">
        <a href="/rezervacia/moment-club/" class="tool">
          <div class="tool-icon">📆</div>
          <div class="tool-name">Rezervačný systém</div>
          <div class="tool-desc">Správa termínov a stolísk</div>
        </a>
        <a href="/nastavenie-turnaja/" class="tool">
          <div class="tool-icon">🏆</div>
          <div class="tool-name">Vytvoriť turnaj</div>
          <div class="tool-desc">Bracket, live výsledky</div>
        </a>
        <a href="/vytvorit-udalost/" class="tool">
          <div class="tool-icon">📅</div>
          <div class="tool-name">Vytvoriť udalosť</div>
          <div class="tool-desc">Pridaj do kalendára</div>
        </a>
        <a href="/trening/" class="tool">
          <div class="tool-icon">▶</div>
          <div class="tool-name">Tréning</div>
          <div class="tool-desc">Scoreboardy</div>
        </a>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Info o profile</div>
      <div class="info-list">
        <div class="info-row"><span class="info-label">E-mail</span><span class="info-val">${user.email}</span></div>
        <div class="info-row"><span class="info-label">Rola</span><span class="info-val">${p.role || '—'}</span></div>
        <div class="info-row"><span class="info-label">Plán</span><span class="info-val">${planLabel}</span></div>
        <div class="info-row"><span class="info-label">Adresa</span><span class="info-val">${p.address || '—'}</span></div>
        <div class="info-row"><span class="info-label">Kontakt</span><span class="info-val">${p.contact_email || '—'}</span></div>
        <div class="info-row"><span class="info-label">Člen od</span><span class="info-val">${p.created_at ? new Date(p.created_at).toLocaleDateString('sk-SK',{month:'long',year:'numeric'}) : '—'}</span></div>
      </div>
    </div>
  `;
}

async function doLogout(){
  await SB.auth.signOut();
  window.location.href = '/login/';
}

init();
</script>
</body>
</html>
