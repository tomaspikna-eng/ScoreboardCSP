<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConnectScore Pro – Prihlásenie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg2:#0e0e13;--line:rgba(255,255,255,.08);
  --text:#eeeef2;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-dim:rgba(212,168,67,.1);--gold-b:rgba(212,168,67,.25);
  --green:#1ec86a;--red:#d94f4f;--font:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;display:grid;place-items:center;padding:20px;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(212,168,67,.08),transparent 60%),
    var(--bg);
}
.wrap{width:min(400px,100%);display:flex;flex-direction:column;gap:20px}

/* Brand */
.brand{text-align:center}
.brand-name{font-size:1.6rem;font-weight:800;letter-spacing:-.04em}
.brand-name span{color:var(--gold)}
.brand-sub{font-size:.78rem;color:var(--muted2);margin-top:4px}

/* Card */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:22px;padding:28px 24px;display:flex;flex-direction:column;gap:16px}
.card-title{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:4px}

/* Social */
.social-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px;border-radius:13px;
  border:1px solid var(--line);background:rgba(255,255,255,.03);
  color:var(--text);font-family:var(--font);font-size:.9rem;font-weight:700;
  cursor:pointer;transition:.15s;
}
.social-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15)}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}

/* Field */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2)}
.field input{
  background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;
  color:var(--text);font-family:var(--font);font-size:.9rem;padding:12px 14px;
  outline:none;transition:.15s;
}
.field input:focus{border-color:var(--gold-b);background:rgba(255,255,255,.05)}

/* Btn */
.btn-primary{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:var(--gold);color:#1a1000;
  font-family:var(--font);font-size:.95rem;font-weight:800;
  cursor:pointer;transition:.15s;
}
.btn-primary:hover{background:#e8b94f}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* Msg */
.msg{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;display:none;text-align:center}
.msg.ok{background:rgba(30,200,106,.1);border:1px solid rgba(30,200,106,.25);color:#c8ffdc;display:block}
.msg.err{background:rgba(217,79,79,.1);border:1px solid rgba(217,79,79,.25);color:#ffd0d0;display:block}

/* Footer */
.footer{text-align:center;font-size:.73rem;color:var(--muted);line-height:1.8}
.footer a{color:var(--muted2);text-decoration:none}
.footer a:hover{color:var(--text)}
.footer .reg-link{color:var(--gold);font-weight:700;text-decoration:none}
.footer .reg-link:hover{color:#e8b94f}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-name"><span>ConnectScore</span>Pro</div>
    <div class="brand-sub">Turnajový systém pre biliard, šípky a bowling</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-title">Prihlásiť sa</div>

    <!-- Google -->
    <button class="social-btn" id="btnGoogle" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Pokračovať cez Google
    </button>

    <div class="divider">alebo e-mailom</div>

    <!-- Email + heslo -->
    <div class="field">
      <label>E-mailová adresa</label>
      <input id="email" type="email" placeholder="vas@email.sk" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Heslo</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loginEmail()"/>
    </div>

    <div class="msg" id="msg"></div>

    <button class="btn-primary" id="btnEmail" onclick="loginEmail()">Prihlásiť sa</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    Nemáš účet? <a href="/registracia/" class="reg-link">Zaregistruj sa →</a><br>
    <a href="/ochrana-osobnych-udajov/">Ochrana údajov</a> · <a href="/obchodne-podmienky/">Podmienky</a>
  </div>

</div>

<script>
const SB = window.supabase.createClient(
  'https://gilzomwhuwcxpkegtlhj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbHpvbXdodXdjeHBrZWd0bGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzMwMTgsImV4cCI6MjA5MjYwOTAxOH0.-KiLSdiB2mRWqUDB9GWyISfCu2o_ZBM80aGUEW9CcUg'
);

// Ak je už prihlásený → profil
SB.auth.onAuthStateChange((event, session) => {
  if(session) redirectToProfile(session.user);
});

// Zisti rolu a presmeruj na správny profil
async function redirectToProfile(user){
  const { data: p } = await SB.from('profiles').select('role').eq('id', user.id).single();
  const role = p?.role || null;
  if(!role) { window.location.href = '/registracia/'; return; }
  const map = { hrac:'/hrac/', klub:'/klub/', organizacia:'/organizacia/' };
  window.location.href = map[role] || '/registracia/';
}

async function loginGoogle(){
  const btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  const { error } = await SB.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://cspboard.digital/login/' }
  });
  if(error){ showMsg(error.message, 'err'); btn.disabled = false; }
}

async function loginEmail(){
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email){ showMsg('Zadaj e-mail.','err'); return; }
  if(!password){ showMsg('Zadaj heslo.','err'); return; }
  const btn = document.getElementById('btnEmail');
  btn.disabled=true; btn.textContent='Prihlasujem...';
  const {data, error} = await SB.auth.signInWithPassword({email, password});
  btn.disabled=false; btn.textContent='Prihlásiť sa';
  if(error){
    if(error.message.includes('Invalid')) showMsg('Nesprávny e-mail alebo heslo.','err');
    else showMsg(error.message,'err');
    return;
  }
  await redirectToProfile(data.user);
}

function showMsg(text, type){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
</script>
</body>
</html>
