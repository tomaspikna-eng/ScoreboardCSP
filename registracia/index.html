<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConnectScore Pro – Registrácia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg2:#0e0e13;--bg3:#131318;
  --line:rgba(255,255,255,.08);
  --text:#eeeef2;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-dim:rgba(212,168,67,.09);--gold-b:rgba(212,168,67,.25);
  --green:#1ec86a;--red:#d94f4f;
  --font:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:32px 16px;
  background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(212,168,67,.07),transparent 55%),var(--bg);}
.wrap{max-width:420px;width:100%;display:flex;flex-direction:column;gap:20px}
.brand{text-align:center}
.brand-name{font-size:1.8rem;font-weight:800;letter-spacing:-.03em}
.brand-name span{color:var(--gold)}
.brand-sub{font-size:.78rem;color:var(--muted2);margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:14px}
.card-title{font-size:1.1rem;font-weight:800;text-align:center}
.card-sub{font-size:.78rem;color:var(--muted2);text-align:center;line-height:1.5}
.info-box{padding:10px 14px;border-radius:10px;background:var(--gold-dim);border:1px solid var(--gold-b);font-size:.75rem;color:var(--text);line-height:1.5;text-align:center}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);font-family:var(--font);font-size:.9rem;font-weight:700;cursor:pointer}
.social-btn:hover{background:rgba(255,255,255,.07)}
.social-btn:disabled{opacity:.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2)}
.field input{background:var(--bg3);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.9rem;padding:12px 14px;outline:none;width:100%}
.field input:focus{border-color:var(--gold-b)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:11px;font:700 .9rem/1 var(--font);cursor:pointer;border:none;width:100%}
.btn-gold{background:var(--gold);color:#1a1000}.btn-gold:hover{background:#e8b94f}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;display:none;text-align:center}
.msg.ok{background:rgba(30,200,106,.1);border:1px solid rgba(30,200,106,.25);color:#c8ffdc;display:block}
.msg.err{background:rgba(217,79,79,.1);border:1px solid rgba(217,79,79,.25);color:#ffd0d0;display:block;text-align:left}
.foot{text-align:center;font-size:.78rem;color:var(--muted2)}
.foot a{color:var(--gold);text-decoration:none;font-weight:700}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-name"><span>ConnectScore</span>Pro</div>
    <div class="brand-sub">Vytvor si bezplatný účet</div>
  </div>

  <div class="card">
    <div class="card-title">Registrácia</div>
    <div class="card-sub">V testovacej fáze: každý nový účet má <strong style="color:var(--gold)">Klub Ultra</strong> plán zdarma.</div>

    <button class="social-btn" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Registrovať cez Google
    </button>

    <div class="divider">alebo e-mailom</div>

    <div class="field"><label>E-mail</label><input id="email" type="email" placeholder="vas@email.sk"/></div>
    <div class="field"><label>Heslo (min. 8 znakov)</label><input id="password" type="password" placeholder="••••••••"/></div>
    <div class="field"><label>Zopakuj heslo</label><input id="password2" type="password" placeholder="••••••••"/></div>

    <div class="msg" id="msg"></div>
    <button class="btn btn-gold" id="btnReg">Vytvoriť účet →</button>
  </div>

  <div class="foot">
    Máš už účet? <a href="/login/">Prihlás sa →</a>
  </div>
</div>

<script>
(function(){
  if(window.location.hash && window.location.hash.includes('access_token'))
    history.replaceState(null,'',window.location.pathname);
})();

const SB = window.supabase.createClient(
  'https://gilzomwhuwcxpkegtlhj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbHpvbXdodXdjeHBrZWd0bGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzMwMTgsImV4cCI6MjA5MjYwOTAxOH0.-KiLSdiB2mRWqUDB9GWyISfCu2o_ZBM80aGUEW9CcUg'
);

async function ensureProfileAndRedirect(user){
  console.log('[REG] ensureProfileAndRedirect for', user.id);

  const { data: existing, error: fetchErr } = await SB.from('profiles')
    .select('id').eq('id', user.id).maybeSingle();

  console.log('[REG] Profile lookup:', existing, fetchErr || '');

  if(fetchErr && fetchErr.code !== 'PGRST116'){
    showMsg('Chyba pri overení profilu: ' + fetchErr.message, 'err');
    return;
  }

  if(!existing){
    console.log('[REG] Creating new profile (klub/ultra)');
    const profileData = {
      id: user.id,
      role: 'klub',
      plan: 'ultra',
      full_name: (user.user_metadata?.full_name) || user.email.split('@')[0],
      username: user.email.split('@')[0].toLowerCase().replace(/[^a-z0-9_.]/g,''),
    };
    console.log('[REG] Inserting:', profileData);

    const { data: inserted, error: insertErr } = await SB.from('profiles')
      .upsert(profileData, { onConflict: 'id' })
      .select();

    if(insertErr){
      console.error('[REG] Insert error:', insertErr);
      let msg = 'Chyba pri vytváraní profilu: ' + insertErr.message;
      if(insertErr.message.includes('row-level security')){
        msg += '<br><br>⚠ Supabase RLS blokuje. Skontroluj RLS policy na <strong>profiles</strong> tabuľke.';
      }
      if(insertErr.message.includes('column') && insertErr.message.includes('does not exist')){
        msg += '<br><br>⚠ Chýba stĺpec v <strong>profiles</strong>. Spusti SQL: ALTER TABLE profiles ADD COLUMN IF NOT EXISTS plan text DEFAULT \'free\';';
      }
      showMsg(msg, 'err');
      return;
    }
    console.log('[REG] Profile created:', inserted);
  }

  console.log('[REG] Redirecting to /klub/');
  window.location.href = '/klub/';
}

// Auth listener (pre OAuth callback)
SB.auth.onAuthStateChange(async (event, session) => {
  console.log('[REG] onAuthStateChange:', event, session ? session.user.email : '-');
  if((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session){
    await ensureProfileAndRedirect(session.user);
  }
});

// Initial check — ak už je session, presmeruj
(async function init(){
  const { data: { session } } = await SB.auth.getSession();
  console.log('[REG] init session:', session ? session.user.email : 'none');
  if(session){
    await ensureProfileAndRedirect(session.user);
  }
})();

// Google sign-up
document.getElementById('btnGoogle').addEventListener('click', async () => {
  console.log('[REG] Google clicked');
  const btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  const { error } = await SB.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/registracia/' }
  });
  if(error){
    showMsg('Chyba: ' + error.message, 'err');
    btn.disabled = false;
  }
});

// Email sign-up
document.getElementById('btnReg').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('password2').value;

  if(!email){ showMsg('Zadaj e-mail.','err'); return; }
  if(!p1 || p1.length < 8){ showMsg('Heslo musí mať aspoň 8 znakov.','err'); return; }
  if(p1 !== p2){ showMsg('Heslá sa nezhodujú.','err'); return; }

  const btn = document.getElementById('btnReg');
  btn.disabled = true; btn.textContent = 'Vytváram účet...';
  console.log('[REG] signUp:', email);

  const { data, error } = await SB.auth.signUp({ email, password: p1 });

  if(error){
    btn.disabled = false; btn.textContent = 'Vytvoriť účet →';
    console.error('[REG] signUp error:', error);
    let msg = error.message;
    if(error.message.toLowerCase().includes('already')) {
      msg = 'Tento e-mail je už registrovaný. <a href="/login/" style="color:var(--gold);text-decoration:underline">Prihlás sa →</a>';
    }
    showMsg(msg, 'err');
    return;
  }

  console.log('[REG] signUp success, has session?', !!data.session);

  if(data.session){
    // Auto-confirmed, ensureProfile sa zavolá cez onAuthStateChange
    console.log('[REG] Auto-confirmed, redirecting via auth state change');
    // Fallback ak by sa to nestalo
    setTimeout(() => {
      if(window.location.pathname === '/registracia/'){
        ensureProfileAndRedirect(data.user);
      }
    }, 1500);
  } else {
    // Email confirmation required
    btn.disabled = false; btn.textContent = 'Vytvoriť účet →';
    showMsg('<strong>✓ Účet vytvorený!</strong><br>Skontroluj e-mail a klikni na potvrdzovací odkaz. Potom sa <a href="/login/" style="color:var(--gold);text-decoration:underline">prihlás</a>.', 'ok');
  }
});

function showMsg(text, type){
  const el = document.getElementById('msg');
  el.innerHTML = text;
  el.className = 'msg ' + type;
}
</script>
</body>
</html>
