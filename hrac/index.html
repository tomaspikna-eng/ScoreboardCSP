<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConnectScore Pro – Profil hráča</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg2:#0d0d11;--bg3:#131318;--bg4:#18181f;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.04);
  --text:#eeeef2;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-dim:rgba(212,168,67,.09);--gold-b:rgba(212,168,67,.22);
  --green:#1ec86a;--green-dim:rgba(30,200,106,.08);--green-b:rgba(30,200,106,.2);
  --blue:#4a82cc;--blue-dim:rgba(74,130,204,.08);--blue-b:rgba(74,130,204,.2);
  --red:#d94f4f;--red-dim:rgba(217,79,79,.08);--red-b:rgba(217,79,79,.22);
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(212,168,67,.07),transparent 55%),var(--bg);
}
.page{max-width:1100px;margin:0 auto;padding:28px 20px 80px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.brand{font-size:1.1rem;font-weight:800;letter-spacing:-.03em}
.brand span{color:var(--gold)}
.topbar-right{display:flex;gap:8px;align-items:center}

/* HERO */
.hero{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center;
  padding:22px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;margin-bottom:16px}
.avatar-wrap{position:relative;cursor:pointer;flex:0 0 auto}
.avatar-ring{width:88px;height:88px;border-radius:50%;padding:3px;
  background:linear-gradient(135deg,var(--gold),rgba(74,130,204,.5))}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;background:var(--bg3);display:block}
.avatar-overlay{position:absolute;inset:3px;border-radius:50%;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;opacity:0;transition:.2s}
.avatar-wrap:hover .avatar-overlay{opacity:1}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);
  letter-spacing:.04em;line-height:1;margin-bottom:8px}
.hero-name span{color:var(--gold)}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;
  font-size:.72rem;font-weight:700;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted2)}
.tag.gold{border-color:var(--gold-b);background:var(--gold-dim);color:var(--gold)}
.tag.green{border-color:var(--green-b);background:var(--green-dim);color:var(--green)}
.tag.blue{border-color:var(--blue-b);background:var(--blue-dim);color:var(--blue)}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap}

/* PLAN BADGE */
.plan-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;
  font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.plan-free{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted2)}
.plan-pro{background:var(--blue-dim);border:1px solid var(--blue-b);color:#c5d9f5}
.plan-ultra{background:var(--gold-dim);border:1px solid var(--gold-b);color:var(--gold)}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start}
.left{display:flex;flex-direction:column;gap:14px}
.right{display:flex;flex-direction:column;gap:14px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px}
.card-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted2);font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between}
.card-title a{font-size:.68rem;color:var(--muted);text-decoration:none;
  padding:2px 8px;border-radius:6px;border:1px solid var(--line);transition:.15s}
.card-title a:hover{color:var(--text)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg3);border:1px solid var(--line2);border-radius:10px;padding:12px 14px}
.stat-val{font-family:var(--mono);font-size:1.4rem;font-weight:600;line-height:1}
.stat-val.gold{color:var(--gold)}
.stat-val.green{color:var(--green)}
.stat-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-top:3px}

/* TOOLS */
.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tool{border:1px solid var(--line);border-radius:12px;padding:14px;
  background:rgba(255,255,255,.02);text-decoration:none;display:block;transition:.15s;position:relative}
.tool:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12)}
.tool.gold{border-color:var(--gold-b);background:var(--gold-dim)}
.tool.blue{border-color:var(--blue-b);background:var(--blue-dim)}
.tool.locked{opacity:.5;cursor:not-allowed}
.tool-icon{font-size:1.2rem;margin-bottom:6px}
.tool-name{font-size:.84rem;font-weight:700;color:var(--text)}
.tool-desc{font-size:.68rem;color:var(--muted2);margin-top:2px;line-height:1.4}
.lock-badge{position:absolute;top:8px;right:8px;font-size:.58rem;font-weight:700;
  padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line)}

/* AKTIVITY LIST */
.activity-list{display:flex;flex-direction:column;gap:8px}
.activity-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  padding:10px 12px;background:var(--bg3);border:1px solid var(--line2);border-radius:10px;transition:.15s}
.activity-row:hover{border-color:rgba(255,255,255,.1)}
.act-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:.9rem;flex:0 0 34px}
.act-icon.gold{background:var(--gold-dim);border:1px solid var(--gold-b)}
.act-icon.blue{background:var(--blue-dim);border:1px solid var(--blue-b)}
.act-icon.green{background:var(--green-dim);border:1px solid var(--green-b)}
.act-name{font-size:.84rem;font-weight:700;margin-bottom:2px}
.act-meta{font-size:.68rem;color:var(--muted2)}
.act-status{font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap}
.st-running{background:rgba(30,200,106,.12);border:1px solid var(--green-b);color:var(--green)}
.st-open{background:var(--blue-dim);border:1px solid var(--blue-b);color:#c5d9f5}
.st-done{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted)}

/* UPGRADE */
.upgrade{border:1px solid var(--gold-b);border-radius:14px;padding:16px;
  background:var(--gold-dim);text-align:center}
.upgrade h3{font-size:.9rem;font-weight:800;color:var(--gold);margin-bottom:6px}
.upgrade p{font-size:.75rem;color:var(--muted2);margin-bottom:12px;line-height:1.5}

/* EMPTY */
.empty{color:var(--muted);font-size:.82rem;padding:8px 0;text-align:center;line-height:1.6}
.empty a{color:var(--gold);text-decoration:none;font-weight:700}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;min-height:36px;
  border-radius:10px;font:700 .82rem/1 var(--font);cursor:pointer;border:none;
  text-decoration:none;transition:.15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:#1a1000}.btn-gold:hover{background:#e8b94f}
.btn-green{background:var(--green);color:#06230f}.btn-green:hover{background:#1adf72}
.btn-dark{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}.btn-dark:hover{background:rgba(255,255,255,.09)}
.btn-blue{background:var(--blue-dim);color:#c5d9f5;border:1px solid var(--blue-b)}.btn-blue:hover{background:rgba(74,130,204,.15)}
.btn-sm{min-height:28px;padding:0 10px;font-size:.72rem;border-radius:7px}

/* QUICK INFO */
.info-list{display:flex;flex-direction:column;gap:0}
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--line2);gap:12px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:.72rem;color:var(--muted2)}
.info-val{font-size:.78rem;font-weight:700;color:var(--text);text-align:right}

@media(max-width:900px){.grid{grid-template-columns:1fr}}
@media(max-width:600px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.tools{grid-template-columns:1fr}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .3s ease both}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page">

  <!-- TOPBAR -->
  <div class="topbar fade">
    <div class="brand"><span>ConnectScore</span>Pro</div>
    <div class="topbar-right">
      <a href="/nastavenie-profilu/" class="btn btn-dark btn-sm">⚙️ Nastavenia</a>
      <button class="btn btn-dark btn-sm" onclick="doLogout()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero fade" style="animation-delay:.05s">
    <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
      <div class="avatar-ring"><img id="avatarImg" src="" alt=""/></div>
      <div class="avatar-overlay">📷</div>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/>
    <div>
      <div class="hero-name" id="profileName">—</div>
      <div class="hero-meta">
        <span class="tag" id="locationTag" style="display:none"></span>
        <span class="tag" id="sportTag" style="display:none"></span>
        <span class="tag" id="klubTag" style="display:none"></span>
        <span class="tag green">● Online</span>
        <span class="plan-badge plan-free" id="planBadge">Free</span>
      </div>
      <div class="hero-actions" id="heroActions"></div>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">
  <div class="left">

    <!-- ŠTATISTIKY -->
    <div class="card fade" style="animation-delay:.08s">
      <div class="card-title">Štatistiky</div>
      <div class="stats">
        <div class="stat"><div class="stat-val" id="stTurnaje">—</div><div class="stat-label">Turnaje</div></div>
        <div class="stat"><div class="stat-val green" id="stVyhry">—</div><div class="stat-label">Výhry</div></div>
        <div class="stat"><div class="stat-val gold" id="stTituly">—</div><div class="stat-label">Tituly</div></div>
      </div>
    </div>

    <!-- NÁSTROJE -->
    <div class="card fade" style="animation-delay:.1s">
      <div class="card-title">Nástroje</div>
      <div class="tools" id="toolsGrid">
        <!-- Naplní JS podľa plánu -->
      </div>
    </div>

    <!-- MOJE AKTIVITY -->
    <div class="card fade" style="animation-delay:.12s">
      <div class="card-title">
        Moje aktivity
        <a href="/vytvorit-udalost/">+ Nová</a>
      </div>
      <div id="aktivityList" class="empty">Načítavam...</div>
    </div>

  </div><!-- /left -->

  <div class="right">

    <!-- UPGRADE (len pre Free) -->
    <div class="upgrade fade" id="upgradeBox" style="display:none;animation-delay:.08s">
      <h3>🚀 Chceš viac?</h3>
      <p>Hráč Pro — tréning, udalosti, turnaje<br>Hráč Ultra — + ligy, rebríčky, analytika</p>
      <a href="/nastavenie-profilu/" class="btn btn-gold btn-sm" style="width:100%;justify-content:center">Vybrať plán</a>
    </div>

    <!-- INFO -->
    <div class="card fade" style="animation-delay:.1s">
      <div class="card-title">Môj profil <a href="/nastavenie-profilu/">Upraviť</a></div>
      <div class="info-list">
        <div class="info-row"><span class="info-label">Plán</span><span class="info-val" id="infoPlán">—</span></div>
        <div class="info-row"><span class="info-label">Šport</span><span class="info-val" id="infoSport">—</span></div>
        <div class="info-row"><span class="info-label">Klub</span><span class="info-val" id="infoKlub">—</span></div>
        <div class="info-row"><span class="info-label">Mesto</span><span class="info-val" id="infoMesto">—</span></div>
        <div class="info-row"><span class="info-label">Člen od</span><span class="info-val" id="infoClen">—</span></div>
      </div>
    </div>

  </div><!-- /right -->
  </div><!-- /grid -->
</div><!-- /page -->

<script>
// Hash cleanup
(function(){
  if(window.location.hash&&window.location.hash.includes('access_token'))
    history.replaceState(null,'',window.location.pathname);
})();

const SB = window.supabase.createClient(
  'https://gilzomwhuwcxpkegtlhj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbHpvbXdodXdjeHBrZWd0bGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzMwMTgsImV4cCI6MjA5MjYwOTAxOH0.-KiLSdiB2mRWqUDB9GWyISfCu2o_ZBM80aGUEW9CcUg'
);

const SPORT_MAP = {billiard:'🎱 Biliard',darts:'🎯 Šípky',bowling:'🎳 Bowling',cards:'🃏 Karty',multi:'🏅 Multi'};
const PLAN_MAP  = {free:'Free',pro:'Pro',ultra:'Ultra'};

SB.auth.onAuthStateChange(async (event, session) => {
  if(!session){ window.location.href='/login/'; return; }
  if(event==='SIGNED_IN'||event==='INITIAL_SESSION') await init(session.user);
});

async function init(user){
  const {data:p} = await SB.from('profiles').select('*').eq('id',user.id).single();

  // Ak nie je rola alebo je klub/org → presmeruj
  if(!p?.role){ window.location.href='/nastavenie-profilu/'; return; }
  if(p.role==='klub'){ window.location.href='/klub/'; return; }
  if(p.role==='organizacia'){ window.location.href='/organizacia/'; return; }

  const plan = p.plan || 'free'; // free | pro | ultra

  // Meno
  const nameEl = document.getElementById('profileName');
  const name = p.full_name || user.email?.split('@')[0] || '—';
  const parts = name.trim().split(' ');
  nameEl.innerHTML = parts.length>1 ? parts[0]+' <span>'+parts.slice(1).join(' ')+'</span>' : name;

  // Avatar
  const img = document.getElementById('avatarImg');
  img.src = p.avatar_url ? p.avatar_url+'?t='+Date.now() : (user.user_metadata?.avatar_url||'');

  // Tagy
  const show = (id,text,cls='') => {
    const el=document.getElementById(id);
    if(el&&text){ el.textContent=text; el.style.display=''; if(cls) el.classList.add(cls); }
  };
  if(p.city) show('locationTag','📍 '+p.city);
  if(p.sport) show('sportTag', SPORT_MAP[p.sport]||p.sport);
  if(p.club_name) show('klubTag','🏛️ '+p.club_name);

  // Plan badge
  const badge = document.getElementById('planBadge');
  badge.textContent = PLAN_MAP[plan]||'Free';
  badge.className = 'plan-badge plan-'+plan;

  // Hero akcie podľa plánu
  document.getElementById('heroActions').innerHTML = heroActions(plan);

  // Sidebar info
  document.getElementById('infoPlán').textContent = PLAN_MAP[plan]||'Free';
  document.getElementById('infoSport').textContent = SPORT_MAP[p.sport]||'—';
  document.getElementById('infoKlub').textContent = p.club_name||'—';
  document.getElementById('infoMesto').textContent = p.city||'—';
  if(p.created_at)
    document.getElementById('infoClen').textContent =
      new Date(p.created_at).toLocaleDateString('sk-SK',{month:'long',year:'numeric'});

  // Upgrade box
  if(plan==='free') document.getElementById('upgradeBox').style.display='';

  // Nástroje
  document.getElementById('toolsGrid').innerHTML = toolsHTML(plan);

  // Štatistiky + aktivity
  await loadStats(user.id);
  await loadAktivity(user.id);
}

function heroActions(plan){
  const base = `<a href="/nastavenie-turnaja/" class="btn btn-dark">🏆 Turnaj</a>
    <a href="/vytvorit-udalost/" class="btn btn-dark">📅 Udalosť</a>`;
  if(plan==='free')
    return `<a href="/nastavenie-profilu/" class="btn btn-gold">🚀 Upgrade</a>${base}`;
  return `<a href="/trening/" class="btn btn-green">▶ Tréning</a>${base}`;
}

function toolsHTML(plan){
  const locked = plan==='free';
  return `
    <a href="${locked?'#':'/trening/'}" class="tool ${locked?'locked':'gold'}" ${locked?'onclick="return upgradeAlert()"':''}>
      ${locked?'<span class="lock-badge">Pro</span>':''}
      <div class="tool-icon">▶</div>
      <div class="tool-name">Spustiť tréning</div>
      <div class="tool-desc">Počítadlo, história, štatistiky</div>
    </a>
    <a href="/nastavenie-turnaja/" class="tool blue">
      <div class="tool-icon">🏆</div>
      <div class="tool-name">Vytvoriť turnaj</div>
      <div class="tool-desc">Bracket, live výsledky</div>
    </a>
    <a href="/vytvorit-udalost/" class="tool">
      <div class="tool-icon">📅</div>
      <div class="tool-name">Vytvoriť udalosť</div>
      <div class="tool-desc">Pridaj do CSP kalendára</div>
    </a>
    <a href="/preregistracia/" class="tool">
      <div class="tool-icon">📋</div>
      <div class="tool-name">Prihlasovanie</div>
      <div class="tool-desc">Formulár pre hráčov</div>
    </a>`;
}

function upgradeAlert(){
  if(confirm('Táto funkcia je dostupná od plánu Pro. Chceš prejsť na nastavenia?'))
    window.location.href='/nastavenie-profilu/';
  return false;
}

async function loadStats(userId){
  const {count:tn} = await SB.from('tournaments')
    .select('*',{count:'exact',head:true}).eq('organizer_id',userId);
  if(tn!=null) document.getElementById('stTurnaje').textContent = tn;

  // Výhry a tituly — placeholder kým nebude tabuľka results
  document.getElementById('stVyhry').textContent = '—';
  document.getElementById('stTituly').textContent = '—';
}

async function loadAktivity(userId){
  const el = document.getElementById('aktivityList');

  const [{data:ev},{data:tn}] = await Promise.all([
    SB.from('events').select('id,nazov,datum,status,sport').eq('organizer_id',userId)
      .order('created_at',{ascending:false}).limit(5),
    SB.from('tournaments').select('id,nazov,datum,status,sport').eq('organizer_id',userId)
      .order('created_at',{ascending:false}).limit(5)
      .then(r=>r).catch(()=>({data:[]}))
  ]);

  const all = [
    ...(tn||[]).map(t=>({...t,_type:'turnaj'})),
    ...(ev||[]).map(e=>({...e,_type:'udalost'}))
  ].sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0)).slice(0,6);

  if(!all.length){
    el.innerHTML = '<div class="empty">Zatiaľ žiadne aktivity.<br><a href="/vytvorit-udalost/">Vytvor prvú udalosť →</a></div>';
    return;
  }

  const ST = {running:'st-running',open:'st-open',done:'st-done'};
  const SL = {running:'🟢 Prebieha',open:'Otvorená',done:'Ukončená',draft:'Draft'};
  const IC = {turnaj:{cls:'gold',icon:'🏆'},udalost:{cls:'blue',icon:'📅'}};

  el.innerHTML = '<div class="activity-list">'+all.map(item=>`
    <div class="activity-row">
      <div class="act-icon ${IC[item._type].cls}">${IC[item._type].icon}</div>
      <div>
        <div class="act-name">${item.nazov||'—'}</div>
        <div class="act-meta">${item.datum||'—'} · ${item._type==='turnaj'?'Turnaj':'Udalosť'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <span class="act-status ${ST[item.status]||'st-done'}">${SL[item.status]||item.status||'—'}</span>
        <a href="/${item._type==='turnaj'?'priebeh-turnaja':'udalost'}/?id=${item.id}" class="btn btn-dark btn-sm">Otvoriť</a>
      </div>
    </div>`).join('')+'</div>';
}

// Avatar upload
async function uploadAvatar(input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>5*1024*1024){ alert('Max 5 MB.'); return; }
  const {data:{session}} = await SB.auth.getSession();
  if(!session) return;
  const ext=file.name.split('.').pop()||'jpg';
  const path=`avatars/${session.user.id}/avatar.${ext}`;
  const {error}=await SB.storage.from('avatars').upload(path,file,{upsert:true,contentType:file.type});
  if(error){ alert('Chyba: '+error.message); return; }
  const {data:u}=SB.storage.from('avatars').getPublicUrl(path);
  await SB.from('profiles').update({avatar_url:u.publicUrl}).eq('id',session.user.id);
  document.getElementById('avatarImg').src=u.publicUrl+'?t='+Date.now();
  input.value='';
}

// Logout
