<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSP – Tréning</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--bg2:#0b0b0b;--line:rgba(255,255,255,.08);--text:#f4f4f4;--muted:#a7a7a7;--gold:#d8b04b;--green:#22d36b;--shadow:0 20px 60px rgba(0,0,0,.34)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{min-height:100vh;font-family:"Barlow",sans-serif;color:var(--text);background:radial-gradient(circle at top center,rgba(216,176,75,.08),transparent 26%),linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);display:grid;place-items:center;padding:24px}
.wrap{width:min(600px,100%);display:grid;gap:18px}
.panel{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));box-shadow:var(--shadow);padding:36px 28px;text-align:center}
h1{font-size:2rem;font-weight:900;color:var(--gold);letter-spacing:-.05em;margin:0 0 8px}
p{color:var(--muted);margin:0 0 32px;font-size:.95rem}
.sport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sport-card{border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.02);padding:24px 16px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .15s}
.sport-card:hover{border-color:rgba(216,176,75,.4);background:rgba(216,176,75,.06);transform:translateY(-2px)}
.sport-icon{font-size:2.8rem;line-height:1}
.sport-name{font-size:1rem;font-weight:900;color:#fff}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);text-decoration:none;font-weight:700;font-size:.9rem;justify-content:center}
.back-btn:hover{color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>Vyber šport</h1>
    <p>Klikni na šport a spusti tréning.</p>
    <div class="sport-grid">
      <a href="/trening/biliard/" class="sport-card">
        <div class="sport-icon">🎱</div>
        <div class="sport-name">Biliard</div>
      </a>
      <a href="/trening/sipky/" class="sport-card">
        <div class="sport-icon">🎯</div>
        <div class="sport-name">Šípky</div>
      </a>
      <a href="/trening/bowling/" class="sport-card">
        <div class="sport-icon">🎳</div>
        <div class="sport-name">Bowling</div>
      </a>
    </div>
  </div>
  <a href="/profil/" class="back-btn">← Späť na profil</a>
</div>
</body>
</html>
