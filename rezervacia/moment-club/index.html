<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CSP – Rezervácia · Moment Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070a;--bg2:#0e0e13;--bg3:#14141a;--bg4:#1a1a22;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.03);
  --text:#e8e8f0;--muted:#50506a;--muted2:#80809a;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,.1);--gold-b:rgba(201,168,76,.22);
  --green:#1ec86a;--green-dim:rgba(30,200,106,.08);--green-b:rgba(30,200,106,.18);
  --red:#d94f4f;--red-dim:rgba(217,79,79,.08);--red-b:rgba(217,79,79,.2);
  --blue:#4a7fc1;--blue-dim:rgba(74,127,193,.1);
  --amber:#c98a2a;--amber-dim:rgba(201,138,42,.1);
  --slot-h:52px;
  --hour-w:100px;
  --label-w:110px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 35% at 50% 0%,rgba(201,168,76,.055),transparent 55%),
    radial-gradient(ellipse 50% 60% at 100% 100%,rgba(30,200,106,.04),transparent 60%);
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:54px;
  background:rgba(7,7,10,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-logo{width:32px;height:32px;border-radius:9px;overflow:hidden;flex:0 0 auto}
.tb-logo img{width:100%;height:100%;object-fit:cover}
.tb-name{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;color:var(--gold)}
.tb-venue{font-size:.78rem;color:var(--muted2);font-weight:500}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-hours{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* ── DATE NAV ── */
.date-nav{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:0;
  padding:14px 20px;border-bottom:1px solid var(--line);
  overflow-x:auto;scrollbar-width:none;
  background:var(--bg2);
}
.date-nav::-webkit-scrollbar{display:none}
.date-arrow{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--line);background:rgba(255,255,255,.03);
  color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;flex:0 0 auto;transition:.15s;
}
.date-arrow:hover{background:rgba(255,255,255,.07);color:var(--text)}
.date-pills{display:flex;gap:6px;margin:0 10px;flex:1}
.dpill{
  flex:0 0 auto;padding:6px 14px;border-radius:999px;
  border:1px solid var(--line);background:transparent;
  cursor:pointer;text-align:center;transition:.2s;
}
.dpill:hover{border-color:var(--gold-b)}
.dpill.active{background:var(--gold-dim);border-color:var(--gold-b)}
.dpill-day{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.dpill-num{font-size:1rem;font-weight:700;color:var(--text);line-height:1.1}
.dpill-mon{font-size:.62rem;color:var(--muted)}
.dpill.active .dpill-num{color:var(--gold)}
.dpill.today .dpill-day{color:var(--green)}

/* ── SPORT TABS ── */
.sport-tabs{
  position:relative;z-index:1;
  display:flex;gap:0;padding:0 20px;
  border-bottom:1px solid var(--line);background:var(--bg2);
}
.stab{
  padding:10px 18px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:.15s;display:flex;align-items:center;gap:7px;
}
.stab:hover{color:var(--muted2)}
.stab.active{color:var(--gold);border-bottom-color:var(--gold)}
.stab-icon{font-size:1rem}
.stab-count{
  font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:999px;
  background:var(--bg3);border:1px solid var(--line);color:var(--muted);
}
.stab.active .stab-count{background:var(--gold-dim);border-color:var(--gold-b);color:var(--gold)}

/* ── CALENDAR WRAP ── */
.cal-wrap{
  position:relative;z-index:1;
  overflow-x:auto;overflow-y:visible;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
.cal-wrap::-webkit-scrollbar{height:4px}
.cal-wrap::-webkit-scrollbar-track{background:transparent}
.cal-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

.cal-inner{
  min-width:calc(var(--label-w) + var(--hour-w)*14);
  padding-bottom:40px;
}

/* TIME HEADER */
.time-header{
  display:flex;
  padding-left:var(--label-w);
  border-bottom:1px solid var(--line);
  position:sticky;top:54px;z-index:50;
  background:var(--bg2);
}
.time-cell{
  width:var(--hour-w);flex:0 0 var(--hour-w);
  padding:8px 0 8px 10px;
  font-size:.68rem;font-family:'JetBrains Mono',monospace;font-weight:500;
  color:var(--muted);border-left:1px solid var(--line2);
}
.time-cell.now-col{color:var(--green)}

/* RESOURCE ROWS */
.resource-rows{display:flex;flex-direction:column}

.sport-group-label{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;
  color:var(--muted);font-weight:700;
  background:rgba(255,255,255,.015);
  border-bottom:1px solid var(--line2);
  position:sticky;left:0;
}
.sgl-icon{font-size:.9rem}

.resource-row{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--line2);
  min-height:var(--slot-h);
  transition:background .15s;
}
.resource-row:hover{background:rgba(255,255,255,.012)}

.row-label{
  width:var(--label-w);flex:0 0 var(--label-w);
  display:flex;flex-direction:column;justify-content:center;
  padding:8px 14px;
  border-right:1px solid var(--line);
  position:sticky;left:0;z-index:10;
  background:var(--bg2);
}
.rl-num{
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;
  color:var(--gold);line-height:1;
}
.rl-name{font-size:.7rem;color:var(--muted2);margin-top:1px}
.rl-status{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.rl-free{color:var(--green)}
.rl-busy{color:var(--red)}

.row-timeline{
  flex:1;position:relative;display:flex;
  background:repeating-linear-gradient(
    90deg,
    transparent,
    transparent calc(var(--hour-w) - 1px),
    var(--line2) calc(var(--hour-w) - 1px),
    var(--line2) var(--hour-w)
  );
}

/* NOW LINE */
.now-line{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--green);z-index:20;pointer-events:none;
  box-shadow:0 0 8px rgba(30,200,106,.5);
}
.now-line::before{
  content:'';position:absolute;top:-4px;left:-4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px rgba(30,200,106,.7);
}

/* SLOT CELLS (clickable empty) */
.slot-cell{
  position:absolute;top:4px;bottom:4px;
  border-radius:6px;cursor:pointer;
  transition:background .15s;
}
.slot-cell:hover{background:rgba(201,168,76,.06);border:1px dashed rgba(201,168,76,.2)}

/* RESERVATION BLOCKS */
.res-block{
  position:absolute;top:5px;bottom:5px;
  border-radius:8px;overflow:hidden;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;justify-content:center;
  padding:4px 9px;
  border:1px solid transparent;
}
.res-block:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.res-block.confirmed{
  background:linear-gradient(135deg,rgba(30,200,106,.18),rgba(30,200,106,.08));
  border-color:rgba(30,200,106,.25);
}
.res-block.mine{
  background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(201,168,76,.1));
  border-color:rgba(201,168,76,.35);
}
.res-block.blocked{
  background:repeating-linear-gradient(
    45deg,rgba(217,79,79,.05),rgba(217,79,79,.05) 4px,
    rgba(217,79,79,.1) 4px,rgba(217,79,79,.1) 8px
  );
  border-color:rgba(217,79,79,.2);cursor:not-allowed;
}
.rb-name{font-size:.72rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-time{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted2);margin-top:1px}
.rb-block-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--red)}

/* ── BOOKING MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
@media(min-width:600px){
  .overlay{align-items:center}
}
.modal{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:20px 20px 0 0;
  padding:24px 20px 36px;
  width:100%;max-width:480px;
  animation:slideUp .3s ease;
}
@media(min-width:600px){
  .modal{border-radius:20px;padding:28px 24px}
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal-drag{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 20px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--gold);margin-bottom:4px}
.modal-sub{font-size:.8rem;color:var(--muted2);margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
.modal-sub span{display:flex;align-items:center;gap:4px}

.booking-timerow{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.bt-field label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:5px}
.bt-field input[type=time]{
  width:100%;padding:10px 12px;background:rgba(255,255,255,.03);
  border:1px solid var(--line);border-radius:10px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:.95rem;outline:none;
  transition:.2s;
}
.bt-field input[type=time]:focus{border-color:var(--gold-b)}

.mfield{margin-bottom:12px}
.mfield label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:5px}
.mfield input{
  width:100%;padding:11px 13px;background:rgba(255,255,255,.03);
  border:1px solid var(--line);border-radius:10px;color:var(--text);
  font-family:'Syne',sans-serif;font-size:.9rem;outline:none;transition:.2s;
}
.mfield input:focus{border-color:var(--gold-b)}
.mfield input.err{border-color:var(--red-b)}

.dur-chip{
  display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
  border-radius:999px;background:var(--gold-dim);border:1px solid var(--gold-b);
  color:var(--gold);font-size:.75rem;font-weight:600;margin-bottom:14px;
}

.conflict-msg{
  padding:10px 12px;border-radius:10px;
  background:var(--red-dim);border:1px solid var(--red-b);
  color:var(--red);font-size:.8rem;font-weight:600;
  margin-bottom:12px;display:none;
}

.modal-btns{display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-top:18px}
.mbtn{
  padding:12px;border-radius:12px;border:none;
  font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;
  transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.mbtn-cancel{background:rgba(255,255,255,.05);color:var(--muted2)}
.mbtn-cancel:hover{background:rgba(255,255,255,.09)}
.mbtn-book{background:var(--green);color:#05200f}
.mbtn-book:hover{background:#1adf72}
.mbtn-book:disabled{opacity:.4;cursor:not-allowed}

/* SUCCESS toast */
.success-toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--green-b);border-radius:14px;
  padding:12px 22px;font-size:.88rem;font-weight:600;color:var(--text);
  z-index:300;transition:transform .35s ease;white-space:nowrap;
  display:flex;align-items:center;gap:10px;
}
.success-toast.show{transform:translateX(-50%) translateY(0)}
.st-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

/* LEGEND */
.legend{
  display:flex;gap:14px;flex-wrap:wrap;
  padding:12px 20px;border-top:1px solid var(--line);
  font-size:.7rem;color:var(--muted2);
  position:relative;z-index:1;background:var(--bg2);
}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.leg-free{background:rgba(201,168,76,.15);border:1px dashed rgba(201,168,76,.3)}
.leg-taken{background:rgba(30,200,106,.15);border:1px solid rgba(30,200,106,.25)}
.leg-blocked{background:repeating-linear-gradient(45deg,rgba(217,79,79,.1),rgba(217,79,79,.1) 2px,rgba(217,79,79,.2) 2px,rgba(217,79,79,.2) 4px)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

/* ── MOBILE ── */
@media(max-width:520px){
  :root{--hour-w:72px;--label-w:82px;--slot-h:48px}
  .stab{padding:10px 12px;font-size:.72rem}
  .rb-name{font-size:.65rem}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <div class="tb-logo"><img id="logo" src="" alt="CSP"/></div>
    <div>
      <div class="tb-name">CardScoresPro</div>
      <div class="tb-venue" id="venueName">Moment Club</div>
    </div>
  </div>
  <div class="tb-right">
    <div class="tb-hours">15:00 – 23:00</div>
  </div>
</div>

<!-- DATE NAV -->
<div class="date-nav">
  <div class="date-arrow" id="prevWeek">‹</div>
  <div class="date-pills" id="datePills"></div>
  <div class="date-arrow" id="nextWeek">›</div>
</div>

<!-- SPORT TABS -->
<div class="sport-tabs" id="sportTabs"></div>

<!-- CALENDAR -->
<div class="cal-wrap" id="calWrap">
  <div class="cal-inner" id="calInner">
    <!-- Time header -->
    <div class="time-header" id="timeHeader"></div>
    <!-- Resource rows -->
    <div class="resource-rows" id="resourceRows"></div>
  </div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot leg-free"></div> Voľné — klikni pre rezerváciu</div>
  <div class="leg-item"><div class="leg-dot leg-taken"></div> Rezervované</div>
  <div class="leg-item"><div class="leg-dot leg-blocked"></div> Zablokované</div>
</div>

<!-- BOOKING MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modalTitle">Nová rezervácia</div>
    <div class="modal-sub" id="modalSub"></div>

    <div class="booking-timerow">
      <div class="bt-field">
        <label>Od</label>
        <input type="time" id="mTimeFrom" step="1800"/>
      </div>
      <div class="bt-field">
        <label>Do</label>
        <input type="time" id="mTimeTo" step="1800"/>
      </div>
    </div>
    <div class="dur-chip" id="durChip">⏱ 1 hod</div>
    <div class="conflict-msg" id="conflictMsg">⚠ Termín je obsadený</div>

    <div class="mfield">
      <label>Meno a priezvisko *</label>
      <input type="text" id="mName" placeholder="Ján Novák" maxlength="80"/>
    </div>
    <div class="mfield">
      <label>Telefón *</label>
      <input type="tel" id="mPhone" placeholder="+421 900 000 000"/>
    </div>

    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" id="mCancel">Zrušiť</button>
      <button class="mbtn mbtn-book" id="mBook">Rezervovať</button>
    </div>
  </div>
</div>

<!-- SUCCESS TOAST -->
<div class="success-toast" id="successToast">
  <div class="st-dot"></div>
  <span id="successMsg">Rezervácia potvrdená!</span>
</div>

<script>
// ── MOCK DATA (nahradí Supabase) ───────────────────────────
const VENUE = {
  name:       "Moment Club",
  openFrom:   15,   // 15:00
  openTo:     23,   // 23:00
};

const SPORTS_CONFIG = [
  { key:"billiard", label:"Biliard", icon:"🎱", singular:"Stôl"  },
  { key:"darts",    label:"Šípky",   icon:"🎯", singular:"Terč"  },
  { key:"bowling",  label:"Bowling", icon:"🎳", singular:"Dráha" },
];

const RESOURCES = [
  { id:"b1", sport:"billiard", number:1, label:"Stôl 1" },
  { id:"b2", sport:"billiard", number:2, label:"Stôl 2" },
  { id:"b3", sport:"billiard", number:3, label:"Stôl 3" },
  { id:"b4", sport:"billiard", number:4, label:"Stôl 4" },
  { id:"d1", sport:"darts",    number:1, label:"Terč 1" },
  { id:"d2", sport:"darts",    number:2, label:"Terč 2" },
  { id:"w1", sport:"bowling",  number:1, label:"Dráha 1" },
  { id:"w2", sport:"bowling",  number:2, label:"Dráha 2" },
];

// Mock rezervácie — generujeme dynamicky
function generateMockReservations(dateStr){
  const base = [
    { resourceId:"b1", from:16, to:18, name:"Novák M.",   status:"confirmed" },
    { resourceId:"b1", from:20, to:22, name:"Kováč P.",   status:"confirmed" },
    { resourceId:"b2", from:15, to:16.5, name:"Tóth S.", status:"confirmed" },
    { resourceId:"b2", from:18, to:20, name:"Bartoš L.", status:"confirmed" },
    { resourceId:"b3", from:17, to:19, name:"TURNAJ",    status:"blocked"   },
    { resourceId:"b4", from:21, to:23, name:"Urban F.",  status:"confirmed" },
    { resourceId:"d1", from:16, to:17, name:"Sýkora R.", status:"confirmed" },
    { resourceId:"d1", from:19, to:21, name:"Gašpar M.", status:"confirmed" },
    { resourceId:"d2", from:15, to:18, name:"OPRAVA",    status:"blocked"   },
    { resourceId:"w1", from:17, to:19, name:"Hronec T.", status:"confirmed" },
    { resourceId:"w2", from:20, to:22, name:"Foltán I.", status:"confirmed" },
  ];
  // Vrátime len pre aktuálny dátum (v reáli filtruje DB)
  return base.map((r,i)=>({...r, id:"res-"+i, date:dateStr}));
}

// ── STATE ──────────────────────────────────────────────────
const today = new Date();
let selectedDate = today.toISOString().split("T")[0];
let selectedSport = "billiard";
let weekOffset = 0;
let reservations = [];
let bookingState = { resourceId:null, date:null, from:null, to:null };

// ── HELPERS ────────────────────────────────────────────────
const SK_DAYS = ["Ne","Po","Ut","St","Št","Pi","So"];
const SK_MONTHS = ["jan","feb","mar","apr","máj","jún","júl","aug","sep","okt","nov","dec"];

function dateLabel(d){
  return `${SK_DAYS[d.getDay()]} ${d.getDate()}. ${SK_MONTHS[d.getMonth()]}`;
}
function hToX(h){ return (h - VENUE.openFrom) * CSS_HOUR_W; }
function diffH(from,to){
  const [fh,fm]=from.split(":").map(Number);
  const [th,tm]=to.split(":").map(Number);
  return (th*60+tm - fh*60-fm)/60;
}
function fmtDur(h){
  const t=Math.round(h*60);
  return t<60 ? `${t} min` : t%60===0 ? `${t/60} hod` : `${Math.floor(t/60)} hod ${t%60} min`;
}
function timeToH(str){
  const [h,m]=str.split(":").map(Number);
  return h+m/60;
}
function hToTime(h){
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
}

let CSS_HOUR_W = 100;
function updateCssHourW(){
  CSS_HOUR_W = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--hour-w")) || 100;
}

const HOURS = Array.from({length: VENUE.openTo - VENUE.openFrom + 1}, (_,i)=>VENUE.openFrom+i);

// ── INIT ───────────────────────────────────────────────────
function init(){
  updateCssHourW();
  embedLogo();
  renderDatePills();
  renderSportTabs();
  loadAndRender();

  document.getElementById("prevWeek").addEventListener("click",()=>{ weekOffset--; renderDatePills(); });
  document.getElementById("nextWeek").addEventListener("click",()=>{ weekOffset++; renderDatePills(); });
  document.getElementById("overlay").addEventListener("click", e=>{
    if(e.target===document.getElementById("overlay")) closeModal();
  });
  document.getElementById("mCancel").addEventListener("click", closeModal);
  document.getElementById("mBook").addEventListener("click", confirmBooking);
  document.getElementById("mTimeFrom").addEventListener("change", onTimeChange);
  document.getElementById("mTimeTo").addEventListener("change", onTimeChange);
  window.addEventListener("resize",()=>{ updateCssHourW(); loadAndRender(); });
}

// ── DATE PILLS ─────────────────────────────────────────────
function renderDatePills(){
  const pills = document.getElementById("datePills");
  const base  = new Date(today);
  base.setDate(today.getDate() + weekOffset*7);
  // Zobraziť 7 dní
  let html="";
  for(let i=0;i<7;i++){
    const d=new Date(base); d.setDate(base.getDate()+i);
    const iso=d.toISOString().split("T")[0];
    const isToday = iso===today.toISOString().split("T")[0];
    const isSel   = iso===selectedDate;
    html+=`
    <div class="dpill${isSel?" active":""}${isToday?" today":""}" onclick="selectDate('${iso}')">
      <div class="dpill-day">${SK_DAYS[d.getDay()]}</div>
      <div class="dpill-num">${d.getDate()}</div>
      <div class="dpill-mon">${SK_MONTHS[d.getMonth()]}</div>
    </div>`;
  }
  pills.innerHTML=html;
}

function selectDate(iso){
  selectedDate=iso;
  // Update in current week or shift
  renderDatePills();
  loadAndRender();
}

// ── SPORT TABS ─────────────────────────────────────────────
function renderSportTabs(){
  const tabs = document.getElementById("sportTabs");
  tabs.innerHTML = SPORTS_CONFIG.map(s=>{
    const count = RESOURCES.filter(r=>r.sport===s.key).length;
    return `
    <div class="stab${selectedSport===s.key?" active":""}" onclick="selectSport('${s.key}')">
      <span class="stab-icon">${s.icon}</span>
      ${s.label}
      <span class="stab-count">${count}</span>
    </div>`;
  }).join("");
}

function selectSport(key){
  selectedSport=key;
  renderSportTabs();
  renderCalendar();
}

// ── LOAD + RENDER ──────────────────────────────────────────
function loadAndRender(){
  reservations = generateMockReservations(selectedDate);
  renderCalendar();
}

function renderCalendar(){
  updateCssHourW();
  renderTimeHeader();
  renderRows();
  setTimeout(scrollToNow, 50);
}

// ── TIME HEADER ────────────────────────────────────────────
function renderTimeHeader(){
  const header = document.getElementById("timeHeader");
  const nowH   = new Date().getHours() + new Date().getMinutes()/60;
  const isToday= selectedDate===today.toISOString().split("T")[0];

  header.innerHTML = HOURS.map(h=>{
    const isNow = isToday && Math.abs(h-Math.floor(nowH))<1;
    return `<div class="time-cell${isNow?" now-col":""}" style="width:${CSS_HOUR_W}px;flex:0 0 ${CSS_HOUR_W}px">
      ${String(h).padStart(2,"0")}:00
    </div>`;
  }).join("");
}

// ── RESOURCE ROWS ──────────────────────────────────────────
function renderRows(){
  const container = document.getElementById("resourceRows");
  const isToday   = selectedDate===today.toISOString().split("T")[0];
  const nowH      = new Date().getHours() + new Date().getMinutes()/60;
  const totalW    = CSS_HOUR_W * (HOURS.length);

  const filtered  = RESOURCES.filter(r=>r.sport===selectedSport);
  const sport     = SPORTS_CONFIG.find(s=>s.key===selectedSport);

  let html = `
  <div class="sport-group-label">
    <span class="sgl-icon">${sport?.icon||""}</span>
    ${sport?.label||selectedSport} — ${dateLabel(new Date(selectedDate))}
  </div>`;

  filtered.forEach(res=>{
    const resReservations = reservations.filter(r=>r.resourceId===res.id);
    const isBusyNow = isToday && resReservations.some(r=>
      r.status==="confirmed" && r.from<=nowH && r.to>nowH
    );

    // Build blocks HTML
    let blocksHtml = "";

    // Now line
    if(isToday && nowH>=VENUE.openFrom && nowH<=VENUE.openTo){
      const x = (nowH-VENUE.openFrom)*CSS_HOUR_W;
      blocksHtml += `<div class="now-line" style="left:${x}px"></div>`;
    }

    // Clickable empty slots between reservations
    const occupied = resReservations.map(r=>({from:r.from,to:r.to}));
    occupied.sort((a,b)=>a.from-b.from);

    // Find free slots
    let freeSlots = [];
    let cursor = VENUE.openFrom;
    occupied.forEach(o=>{
      if(o.from > cursor) freeSlots.push({from:cursor, to:o.from});
      cursor = Math.max(cursor, o.to);
    });
    if(cursor < VENUE.openTo) freeSlots.push({from:cursor, to:VENUE.openTo});

    freeSlots.forEach(slot=>{
      const x = (slot.from - VENUE.openFrom)*CSS_HOUR_W;
      const w = (slot.to - slot.from)*CSS_HOUR_W;
      blocksHtml += `
      <div class="slot-cell"
           style="left:${x}px;width:${w}px"
           title="Klikni pre rezerváciu ${hToTime(slot.from)}–${hToTime(slot.to)}"
           onclick="openBooking('${res.id}','${hToTime(slot.from)}','${hToTime(slot.to)}')">
      </div>`;
    });

    // Reservation blocks
    resReservations.forEach(r=>{
      const x = (r.from - VENUE.openFrom)*CSS_HOUR_W;
      const w = (r.to - r.from)*CSS_HOUR_W;
      const cls = r.status==="blocked" ? "blocked" : "confirmed";
      blocksHtml += `
      <div class="res-block ${cls}"
           style="left:${x+2}px;width:${w-4}px"
           title="${r.name} · ${hToTime(r.from)}–${hToTime(r.to)}">
        ${r.status==="blocked"
          ? `<div class="rb-block-label">🚫 ${r.name}</div>`
          : `<div class="rb-name">${r.name}</div>
             <div class="rb-time">${hToTime(r.from)}–${hToTime(r.to)}</div>`}
      </div>`;
    });

    html += `
    <div class="resource-row fade-in">
      <div class="row-label">
        <div class="rl-num">${res.number}</div>
        <div class="rl-name">${res.label}</div>
        <div class="rl-status ${isBusyNow?"rl-busy":"rl-free"}">${isBusyNow?"Obsadené":"Voľné"}</div>
      </div>
      <div class="row-timeline" style="width:${totalW}px;min-width:${totalW}px">
        ${blocksHtml}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// ── SCROLL TO NOW ──────────────────────────────────────────
function scrollToNow(){
  const isToday = selectedDate===today.toISOString().split("T")[0];
  if(!isToday) return;
  const nowH = new Date().getHours() + new Date().getMinutes()/60;
  if(nowH < VENUE.openFrom || nowH > VENUE.openTo) return;
  const x = (nowH - VENUE.openFrom)*CSS_HOUR_W - 120;
  document.getElementById("calWrap").scrollTo({ left:Math.max(0,x), behavior:"smooth" });
}

// ── BOOKING MODAL ──────────────────────────────────────────
function openBooking(resourceId, from, to){
  const res   = RESOURCES.find(r=>r.id===resourceId);
  const sport = SPORTS_CONFIG.find(s=>s.key===res?.sport);

  bookingState = { resourceId, date:selectedDate, from, to };

  document.getElementById("modalTitle").textContent = `Rezervovať ${res?.label||""}`;
  document.getElementById("modalSub").innerHTML = `
    <span>${sport?.icon||""} ${sport?.label||""}</span>
    <span>📅 ${dateLabel(new Date(selectedDate))}</span>`;

  document.getElementById("mTimeFrom").value = from;
  document.getElementById("mTimeTo").value   = to;
  document.getElementById("mName").value     = "";
  document.getElementById("mPhone").value    = "";
  document.getElementById("mName").classList.remove("err");
  document.getElementById("mPhone").classList.remove("err");
  document.getElementById("conflictMsg").style.display="none";
  document.getElementById("mBook").disabled = false;

  updateDurChip();
  document.getElementById("overlay").classList.add("open");
  setTimeout(()=>document.getElementById("mName").focus(), 300);
}

function closeModal(){
  document.getElementById("overlay").classList.remove("open");
}

function onTimeChange(){
  const from = document.getElementById("mTimeFrom").value;
  const to   = document.getElementById("mTimeTo").value;
  bookingState.from = from;
  bookingState.to   = to;
  updateDurChip();
  checkConflict();
}

function updateDurChip(){
  const from = document.getElementById("mTimeFrom").value;
  const to   = document.getElementById("mTimeTo").value;
  if(!from||!to) return;
  const h = diffH(from,to);
  const chip = document.getElementById("durChip");
  if(h>0){
    chip.textContent = `⏱ ${fmtDur(h)}`;
    chip.style.display="inline-flex";
  } else {
    chip.style.display="none";
  }
}

function checkConflict(){
  const from = timeToH(document.getElementById("mTimeFrom").value);
  const to   = timeToH(document.getElementById("mTimeTo").value);
  const warn = document.getElementById("conflictMsg");
  const btn  = document.getElementById("mBook");

  if(from>=to){ warn.style.display="block"; warn.textContent="⚠ Čas do musí byť väčší ako od."; btn.disabled=true; return; }

  const conflict = reservations.some(r=>
    r.resourceId===bookingState.resourceId &&
    r.from < to && r.to > from
  );

  if(conflict){
    warn.style.display="block"; warn.textContent="⚠ Termín je obsadený. Uprav čas.";
    btn.disabled=true;
  } else {
    warn.style.display="none";
    btn.disabled=false;
  }
}

function confirmBooking(){
  const name  = document.getElementById("mName").value.trim();
  const phone = document.getElementById("mPhone").value.trim();
  document.getElementById("mName").classList.toggle("err", !name);
  document.getElementById("mPhone").classList.toggle("err", !phone);
  if(!name||!phone) return;

  const from = document.getElementById("mTimeFrom").value;
  const to   = document.getElementById("mTimeTo").value;
  const res  = RESOURCES.find(r=>r.id===bookingState.resourceId);

  // Pridaj do mock dát
  reservations.push({
    id:         "new-"+Date.now(),
    resourceId: bookingState.resourceId,
    from:       timeToH(from),
    to:         timeToH(to),
    name:       name,
    status:     "confirmed",
    date:       bookingState.date,
    mine:       true,
  });

  closeModal();
  renderCalendar();

  // Toast
  const toast = document.getElementById("successToast");
  document.getElementById("successMsg").textContent =
    `✓ ${res?.label} · ${from}–${to} · ${name}`;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 3500);
}

// ── START ──────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", init);
</script>
